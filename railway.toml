[build]
builder = "NIXPACKS"
buildCommand = "cd mdm-backend && ./mvnw -DskipTests package"

[deploy]
startCommand = "cd mdm-backend && java -Duser.timezone=UTC -jar target/mdm-backend-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/api/dashboard/stats"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
