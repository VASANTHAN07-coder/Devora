# Database — Railway provides PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:mdm_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — Railway's free-tier PG allows limited connections
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Server — Railway sets PORT env var
server.port=${PORT:8080}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
# Logging
logging.level.com.mdm=DEBUG

# Serialize LocalDateTime as ISO-8601 string (not array) so mobile can parse it
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator — Railway health checks hit /actuator/health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
