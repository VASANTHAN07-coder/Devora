# Database — Railway sets DATABASE_URL; fallback to local PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mdm_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server — Railway sets PORT env var
server.port=${PORT:8080}

# Logging
logging.level.com.mdm=DEBUG

# Security disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
